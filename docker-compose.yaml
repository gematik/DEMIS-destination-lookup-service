services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 128mb
    environment:
      TZ: Europe/Berlin
      POSTGRES_DB: destination_lookup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./common/src/test/resources/db:/docker-entrypoint-initdb.d/:ro

volumes:
  db_data:
    name: db_data
